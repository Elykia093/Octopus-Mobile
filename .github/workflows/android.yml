name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Install Android SDK packages
        shell: bash
        run: sdkmanager --install "platform-tools" "build-tools;37.0.0" "platforms;android-37.0"

      - name: Normalize Android 37 platform directory
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/android-sdk}}"
          if [ -d "$SDK_ROOT/platforms/android-37.0" ] && [ ! -d "$SDK_ROOT/platforms/android-37" ]; then
            mv "$SDK_ROOT/platforms/android-37.0" "$SDK_ROOT/platforms/android-37"
            sed -i 's/platforms;android-37.0/platforms;android-37/' "$SDK_ROOT/platforms/android-37/package.xml" || true
            sed -i 's/<api-level>37.0<\/api-level>/<api-level>37<\/api-level>/' "$SDK_ROOT/platforms/android-37/package.xml" || true
            sed -i 's/AndroidVersion.ApiLevel=37.0/AndroidVersion.ApiLevel=37/' "$SDK_ROOT/platforms/android-37/source.properties" || true
          fi

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew testDebugUnitTest assembleDebug assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: octopus-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload unsigned release APK for verification
        uses: actions/upload-artifact@v4
        with:
          name: octopus-release-unsigned-verification
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
