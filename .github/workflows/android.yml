name: Android CI/CD

permissions:
  contents: write

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses

    - name: Install Android SDK packages
      run: sdkmanager "platform-tools" "platforms;android-37" "build-tools;37.0.0"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Disabled wrapper validation because it frequently times out connecting to github servers
    # - name: Validate Gradle wrapper
    #   uses: gradle/wrapper-validation-action@v2

    - name: Verify Gradle environment
      run: ./gradlew --version

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Octopus-Mobile-Debug
        path: app/build/outputs/apk/debug/*.apk

  release:
    name: Build Release & Publish
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses

    - name: Install Android SDK packages
      run: sdkmanager "platform-tools" "platforms;android-37" "build-tools;37.0.0"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      # Note: For a signed APK, you will need to add signing configuration via secrets
      run: ./gradlew assembleRelease --no-daemon

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
