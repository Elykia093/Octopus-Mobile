name: Android CI/CD

permissions:
  contents: write

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android platform 37
      run: sdkmanager "platform-tools" "build-tools;37.0.0" "platforms;android-37.0"

    - name: Normalize Android 37 platform directory
      run: |
        if [ -d "$ANDROID_HOME/platforms/android-37.0" ] && [ ! -d "$ANDROID_HOME/platforms/android-37" ]; then
          mv "$ANDROID_HOME/platforms/android-37.0" "$ANDROID_HOME/platforms/android-37"
          sed -i 's/platforms;android-37.0/platforms;android-37/' "$ANDROID_HOME/platforms/android-37/package.xml" || true
          sed -i 's/<api-level>37.0<\/api-level>/<api-level>37<\/api-level>/' "$ANDROID_HOME/platforms/android-37/package.xml" || true
          sed -i 's/AndroidVersion.ApiLevel=37.0/AndroidVersion.ApiLevel=37/' "$ANDROID_HOME/platforms/android-37/source.properties" || true
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Disabled wrapper validation because it frequently times out connecting to github servers
    # - name: Validate Gradle wrapper
    #   uses: gradle/wrapper-validation-action@v2

    - name: Verify Gradle environment
      run: ./gradlew --version

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    - name: Prepare APK
      run: find app/build/outputs/apk/release -name "*.apk" -exec cp {} Octopus.apk \;

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Octopus
        path: Octopus.apk

  release:
    name: Build Release & Publish
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android platform 37
      run: sdkmanager "platform-tools" "build-tools;37.0.0" "platforms;android-37.0"

    - name: Normalize Android 37 platform directory
      run: |
        if [ -d "$ANDROID_HOME/platforms/android-37.0" ] && [ ! -d "$ANDROID_HOME/platforms/android-37" ]; then
          mv "$ANDROID_HOME/platforms/android-37.0" "$ANDROID_HOME/platforms/android-37"
          sed -i 's/platforms;android-37.0/platforms;android-37/' "$ANDROID_HOME/platforms/android-37/package.xml" || true
          sed -i 's/<api-level>37.0<\/api-level>/<api-level>37<\/api-level>/' "$ANDROID_HOME/platforms/android-37/package.xml" || true
          sed -i 's/AndroidVersion.ApiLevel=37.0/AndroidVersion.ApiLevel=37/' "$ANDROID_HOME/platforms/android-37/source.properties" || true
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      # Note: For a signed APK, you will need to add signing configuration via secrets
      run: ./gradlew assembleRelease --no-daemon

    - name: Prepare APK
      run: find app/build/outputs/apk/release -name "*.apk" -exec cp {} Octopus.apk \;

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: Octopus.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
