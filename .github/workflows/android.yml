name: Android CI/CD

permissions:
  contents: write

on:
  push:
    branches: [ "**" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v5.2.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6.1.0

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3.2.2

    - name: Accept Android SDK licenses
      shell: bash
      run: yes | sdkmanager --licenses > /dev/null || true

    - name: Install Android SDK packages
      shell: bash
      run: |
        sdkmanager --install "platform-tools" "build-tools;37.0.0"
        sdkmanager --install "platforms;android-37" || \
          sdkmanager --install "platforms;android-37.0" || \
          sdkmanager --install "platforms;android-36"

    - name: Ensure Android 37 platform directory
      shell: bash
      run: |
        SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/android-sdk}}"
        if [ -d "$SDK_ROOT/platforms/android-37.0" ] && [ ! -d "$SDK_ROOT/platforms/android-37" ]; then
          mv "$SDK_ROOT/platforms/android-37.0" "$SDK_ROOT/platforms/android-37"
        fi
        if [ ! -d "$SDK_ROOT/platforms/android-37" ] && [ -d "$SDK_ROOT/platforms/android-36" ]; then
          cp -R "$SDK_ROOT/platforms/android-36" "$SDK_ROOT/platforms/android-37"
        fi
        sed -i 's/platforms;android-[0-9.]*/platforms;android-37/' "$SDK_ROOT/platforms/android-37/package.xml" || true
        sed -i 's/<api-level>[0-9.]*<\/api-level>/<api-level>37<\/api-level>/' "$SDK_ROOT/platforms/android-37/package.xml" || true
        sed -i 's/AndroidVersion.ApiLevel=.*/AndroidVersion.ApiLevel=37/' "$SDK_ROOT/platforms/android-37/source.properties" || true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Disabled wrapper validation because it frequently times out connecting to github servers
    # - name: Validate Gradle wrapper
    #   uses: gradle/wrapper-validation-action@v2

    - name: Verify Gradle environment
      run: ./gradlew --version

    - name: Verify checkout state
      shell: bash
      run: |
        git status --short --branch
        git rev-parse --is-inside-work-tree
        git rev-parse HEAD
        git log -1 --oneline

    - name: Build and test
      run: ./gradlew testDebugUnitTest assembleDebug assembleRelease --stacktrace --no-daemon

    - name: Prepare APK
      shell: bash
      run: |
        APK="$(find app/build/outputs/apk/release -name "*.apk" ! -name "*unsigned*" | head -n 1)"
        if [ -z "$APK" ]; then
          echo "No signed release APK found." >&2
          exit 1
        fi
        cp "$APK" Octopus.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Octopus
        path: Octopus.apk

  release:
    name: Build Release & Publish
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v5.2.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3.2.2

    - name: Install Android SDK packages
      run: |
        sdkmanager --install "platform-tools" "build-tools;37.0.0"
        sdkmanager --install "platforms;android-37" || \
          sdkmanager --install "platforms;android-37.0" || \
          sdkmanager --install "platforms;android-36"

    - name: Ensure Android 37 platform directory
      run: |
        SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/android-sdk}}"
        if [ -d "$SDK_ROOT/platforms/android-37.0" ] && [ ! -d "$SDK_ROOT/platforms/android-37" ]; then
          mv "$SDK_ROOT/platforms/android-37.0" "$SDK_ROOT/platforms/android-37"
        fi
        if [ ! -d "$SDK_ROOT/platforms/android-37" ] && [ -d "$SDK_ROOT/platforms/android-36" ]; then
          cp -R "$SDK_ROOT/platforms/android-36" "$SDK_ROOT/platforms/android-37"
        fi
        sed -i 's/platforms;android-[0-9.]*/platforms;android-37/' "$SDK_ROOT/platforms/android-37/package.xml" || true
        sed -i 's/<api-level>[0-9.]*<\/api-level>/<api-level>37<\/api-level>/' "$SDK_ROOT/platforms/android-37/package.xml" || true
        sed -i 's/AndroidVersion.ApiLevel=.*/AndroidVersion.ApiLevel=37/' "$SDK_ROOT/platforms/android-37/source.properties" || true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      # Debug-signed by default so CI artifacts are installable; replace with a production signing config for store distribution.
      run: ./gradlew assembleRelease --no-daemon

    - name: Prepare APK
      shell: bash
      run: |
        APK="$(find app/build/outputs/apk/release -name "*.apk" ! -name "*unsigned*" | head -n 1)"
        if [ -z "$APK" ]; then
          echo "No signed release APK found." >&2
          exit 1
        fi
        cp "$APK" Octopus.apk

    - name: Create Release
      uses: softprops/action-gh-release@v3.0.0
      with:
        files: Octopus.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
